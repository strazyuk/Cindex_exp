worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    upstream crawler_service    { server crawler:8001; }
    upstream nlp_service        { server nlp:8002; }
    upstream index_service      { server index-calculator:8003; }

    server {
        listen 80;
        server_name _;

        # Frontend (to be implemented)
        location / {
            proxy_pass http://frontend:80;
        }

        # API routes
        location /api/indexes {
            proxy_pass http://index_service/indexes;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/recalculate {
            proxy_pass http://index_service/recalculate;
            proxy_method POST;
            proxy_set_header Host $host;
        }

        location /api/scheduler/status {
            proxy_pass http://index_service/scheduler/status;
            proxy_set_header Host $host;
        }

        location /api/crawler/ {
            proxy_pass http://crawler_service/;
            proxy_set_header Host $host;
        }

        # Health checks
        location /health/crawler {
            proxy_pass http://crawler_service/health;
        }
        location /health/nlp {
            proxy_pass http://nlp_service/health;
        }
        location /health/index {
            proxy_pass http://index_service/health;
        }
    }
}
