version: "3.9"

services:
  # ─── Infrastructure ─────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: crime
      POSTGRES_PASSWORD: crime
      POSTGRES_DB: crimedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U crime -d crimedb" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs
      - DEFAULT_REGION=ap-southeast-1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4566/_localstack/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Simple bootstrap to create S3 bucket and SQS queue
  localstack-init:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-southeast-1
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url=http://localstack:4566 s3 mb s3://dhaka-crime-raw-html &&
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name dhaka-crime-crawl-queue &&
        echo 'LocalStack initialized'
      "

  # ─── Services ──────────────────────────────────────
  crawler:
    build: ./services/crawler
    depends_on:
      - localstack
    environment:
      - AWS_REGION=ap-southeast-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566
      - SQS_CRAWL_QUEUE_URL=http://localstack:4566/000000000000/dhaka-crime-crawl-queue
      - STORAGE_MODE=s3 # Use LocalStack S3 for development
    volumes:
      - ./services/crawler/storage:/app/storage
    restart: unless-stopped

  nlp:
    build: ./services/nlp
    depends_on:
      - db
      - localstack
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://crime:crime@db:5432/crimedb
      - SQS_CRAWL_QUEUE_URL=http://localstack:4566/000000000000/dhaka-crime-crawl-queue
      - AWS_REGION=ap-southeast-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566
      - INDEX_CALCULATOR_URL=http://index-calculator:8003
    restart: unless-stopped

  index-calculator:
    build: ./services/index-calculator
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://crime:crime@db:5432/crimedb
      - UPSTASH_REDIS_URL=redis://redis:6379
      - RECALCULATE_INTERVAL_MINUTES=15
    restart: unless-stopped

  frontend:
    build: 
      context: ./services/frontend
      args:
        - VITE_API_URL=/api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - crawler
      - nlp
      - index-calculator
      - frontend

volumes:
  postgres_data:
  localstack_data:
